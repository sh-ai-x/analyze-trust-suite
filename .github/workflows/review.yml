name: PR Review (MiniMax)

# Auto-run the in-repo /review-code skill on every PR.
# Routed at MiniMax-M3[1m] via the Anthropic-compatible endpoint
# (ANTHROPIC_BASE_URL=https://api.minimax.io/anthropic). The
# claude-code-action auto-loads .claude/skills/review-code/ from the
# checkout, so the slash command resolves and the skill runs as designed.
#
# Default provider: MiniMax (MINMAX_API_KEY secret).
# Opt-in to Anthropic per-run:
#   Actions → PR Review (MiniMax) → Run workflow →
#     review_provider: anthropic, pr_number: <N>
#   (requires secrets.ANTHROPIC_API_KEY).
#
# Severity gate + auto-approve:
#   - Approve            (no 🔴 critical, no 🟠 major) → check success + auto-approve
#   - Changes Requested  (no 🔴, ≥1 🟠 major)          → check failure
#   - Blocked            (≥1 🔴 critical)              → check failure
#
# Requires the Claude GitHub App installed on the repo, plus
# secrets.MINMAX_API_KEY (default) and/or secrets.ANTHROPIC_API_KEY (opt-in).

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      review_provider:
        description: "Provider for this run (default: minimax)"
        required: false
        default: "minimax"
        type: choice
        options:
          - minimax
          - anthropic
      pr_number:
        description: "PR number to review (required for workflow_dispatch)"
        required: false
        type: string

jobs:
  review-code:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      MINIMAX_BASE_URL: https://api.minimax.io/anthropic
      MINIMAX_MODEL: MiniMax-M3[1m]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve provider + PR number
        id: provider
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "provider=${{ github.event.inputs.review_provider }}" >> "$GITHUB_OUTPUT"
            if [ -z "${{ github.event.inputs.pr_number }}" ]; then
              echo "::error::workflow_dispatch requires a pr_number input."
              exit 1
            fi
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "provider=minimax" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run /review-code (MiniMax)
        id: review_minimax
        if: steps.provider.outputs.provider == 'minimax'
        env:
          ANTHROPIC_BASE_URL: ${{ env.MINIMAX_BASE_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.MINMAX_API_KEY }}
          ANTHROPIC_MODEL: MiniMax-M3[1m]
          ANTHROPIC_DEFAULT_SONNET_MODEL: MiniMax-M3[1m]
          ANTHROPIC_DEFAULT_OPUS_MODEL: MiniMax-M3[1m]
          ANTHROPIC_DEFAULT_HAIKU_MODEL: MiniMax-M3[1m]
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.MINMAX_API_KEY }}
          track_progress: ${{ github.event_name == 'pull_request' }}
          prompt: |
            /review-code --diff ${{ github.repository }}/pull/${{ steps.provider.outputs.pr_number }}

            Render the standard two-layer output (PR summary at top, per-finding
            4-field inline comments). The summary MUST begin with a single line
            exactly of the form:

              **Verdict:** Approve
              **Verdict:** Changes Requested
              **Verdict:** Blocked

            Map verdict strictly to severity (do NOT inflate):
              - 🔴 critical ≥ 1          → **Verdict:** Blocked
              - 🟠 major  ≥ 1, 🔴 = 0    → **Verdict:** Changes Requested
              - no 🔴, no 🟠             → **Verdict:** Approve

            Use the inline-comment MCP tool with `confirmed: true` for each
            major or critical finding. Post the summary as a single PR comment.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"

      - name: Run /review-code (Anthropic opt-in)
        id: review_anthropic
        if: steps.provider.outputs.provider == 'anthropic'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: ${{ github.event_name == 'pull_request' }}
          prompt: |
            /review-code --diff ${{ github.repository }}/pull/${{ steps.provider.outputs.pr_number }}

            Render the standard two-layer output (PR summary at top, per-finding
            4-field inline comments). The summary MUST begin with a single line
            exactly of the form:

              **Verdict:** Approve
              **Verdict:** Changes Requested
              **Verdict:** Blocked

            Map verdict strictly to severity (do NOT inflate):
              - 🔴 critical ≥ 1          → **Verdict:** Blocked
              - 🟠 major  ≥ 1, 🔴 = 0    → **Verdict:** Changes Requested
              - no 🔴, no 🟠             → **Verdict:** Approve

            Use the inline-comment MCP tool with `confirmed: true` for each
            major or critical finding. Post the summary as a single PR comment.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"

      - name: Apply severity gate
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.provider.outputs.pr_number }}
        run: |
          set -uo pipefail
          verdict="$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.user.login == "claude[bot]") | .body' \
            | grep -E '^\*\*Verdict:\*\*' | tail -1 | awk '{print $NF}' || true)"
          echo "Captured verdict: ${verdict:-<none>}"
          case "$verdict" in
            Approve)
              echo "Lowest severity (no critical, no major) — passing."
              exit 0
              ;;
            "Changes"*)
              echo "::error::Changes Requested (major findings present)."
              exit 1
              ;;
            Blocked)
              echo "::error::Blocked (critical findings present)."
              exit 1
              ;;
            *)
              echo "::error::No verdict found in PR comment — review produced no usable output."
              exit 1
              ;;
          esac

      - name: Auto-approve on low severity
        if: success() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.provider.outputs.pr_number }}
        run: |
          set -uo pipefail
          verdict="$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.user.login == "claude[bot]") | .body' \
            | grep -E '^\*\*Verdict:\*\*' | tail -1 | awk '{print $NF}' || true)"
          if [ "$verdict" = "Approve" ]; then
            echo "Verdict is Approve — auto-approving PR."
            gh pr review "$PR_NUMBER" --approve \
              --body "Auto-approved by /review-code (MiniMax-M3[1m]): no 🔴 critical, no 🟠 major."
          else
            echo "Verdict is '$verdict' — not auto-approving."
          fi