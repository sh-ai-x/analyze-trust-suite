name: Claude Code Review (legacy)

# Legacy entry point kept for backwards compatibility.
# The active review pipeline is `.github/workflows/review.yml` (MiniMax default).
# This workflow now only runs when the legacy `claude-code-review` label is
# applied, so PRs are not double-reviewed.
#
# To re-enable the Anthropic-native review on a single PR:
#   gh pr edit <N> --add-label claude-code-review

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

jobs:
  claude-review:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'claude-code-review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'